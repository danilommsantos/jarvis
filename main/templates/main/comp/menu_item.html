<div class="nav-item-wrapper">

       {% if externo %} target="_blank" rel="noopener noreferrer" {% endif %}>

            <span class="nav-link-icon">
                <i class="{{ icon }}"></i>
            </span>
            <span class="nav-link-text">{{ label }}</span>
        </div>
    </a>
</div>
